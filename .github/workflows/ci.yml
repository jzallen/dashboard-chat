name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint (Bazel) ──────────────────────────────────────────────────────────
  # Runs first so formatting/lint failures fail fast without paying test costs.
  # Targets: //frontend:lint, //agent:lint, //backend:lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-lint
          repository-cache: true
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Codegen drift check (DOMAIN_EVENT_TYPES — bead dc-qj9.3.1)
        run: npm run codegen:domain-events:check
      - name: Run lint
        run: bazel test //... --test_tag_filters=lint --nocache_test_results --config=ci

  # ── Frontend tests (Bazel) ────────────────────────────────────────────────
  test-frontend:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-frontend
          repository-cache: true
      - name: Run frontend tests
        run: bazel test //frontend/... --test_tag_filters=-lint --nocache_test_results --config=ci

  # ── Agent tests (Bazel) ───────────────────────────────────────────────────
  test-agent:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-agent
          repository-cache: true
      - name: Run agent tests
        run: bazel test //agent/... --test_tag_filters=-lint --nocache_test_results --config=ci

  # ── Backend tests (Bazel) ─────────────────────────────────────────────────
  # Backend has the most test suites (15 targets) so benefits most from
  # parallelism. uv is required for the Python toolchain.
  test-backend:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-backend
          repository-cache: true
      - uses: astral-sh/setup-uv@v4
      - name: Run backend tests
        run: bazel test //backend/... --test_tag_filters=-lint,-requires-compose --nocache_test_results --config=ci

  # ── Auth-proxy tests (Bazel) ──────────────────────────────────────────────
  test-auth-proxy:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-auth-proxy
          repository-cache: true
      - name: Run auth-proxy tests
        run: bazel test //auth-proxy/... --test_tag_filters=-lint --nocache_test_results --config=ci

  # ── Release (semantic-release) ────────────────────────────────────────────
  # Runs only on push to main (not on pull_request events)
  release:
    needs: [lint, test-frontend, test-agent, test-backend, test-auth-proxy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
