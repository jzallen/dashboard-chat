name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  # ── Tests + Lint (Bazel) ──────────────────────────────────────────────────
  # bazel test //... covers unit tests AND lint:
  #   //frontend:lint, //worker:lint, //backend:lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - uses: astral-sh/setup-uv@v4
      - name: Run all tests
        run: bazel test //... --nocache_test_results --config=ci

  # ── Release (semantic-release) ────────────────────────────────────────────
  # Runs only on push to main (not on pull_request events)
  release:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
