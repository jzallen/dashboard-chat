# Docker Compose for E2E testing with Bazel-built OCI images.
# Images are loaded via `bazel run //backend:image_tar` etc. before starting.
services:
  redis:
    image: redis:7-alpine
    container_name: e2e-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: e2e-minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin  # pragma: allowlist secret
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: dashboard-chat/api:bazel
    container_name: e2e-api
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./data/app.db"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
      DEBUG: "true"
      MINIO_ENDPOINT: "minio:9000"
      AUTH_MODE: "dev"
      AUTO_PROVISION_ORG: "true"
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    image: dashboard-chat/frontend:bazel
    container_name: e2e-frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: dashboard-chat/worker:bazel
    container_name: e2e-worker
    environment:
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET_LOGS: "dashboard-chat.logs"
      S3_REGION: "us-east-1"
      CORS_ORIGIN: "http://localhost:5173"
      AUTH_MODE: "dev"
    ports:
      - "8787:8787"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8787/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: e2e-test
