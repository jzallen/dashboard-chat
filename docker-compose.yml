services:
  # Frontend - nginx serving Vite build
  frontend:
    image: dashboard-chat/frontend:bazel
    container_name: dashboard-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  # Hono Worker - Chat API
  worker:
    image: dashboard-chat/worker:bazel
    container_name: dashboard-worker
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGIN: http://localhost:5173
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      JWKS_URL: ${JWKS_URL:-http://api:8000/.well-known/jwks.json}
    ports:
      - "8787:8787"
    depends_on:
      minio:
        condition: service_healthy

  # PostgreSQL - for persistent storage (optional for DuckDB-only mode)
  db:
    image: postgres:18
    container_name: dashboard-postgres
    profiles: ["full", "postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage for Parquet files
  minio:
    image: minio/minio:latest
    container_name: dashboard-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Auth Proxy - validates tokens and forwards identity headers
  auth-proxy:
    build:
      context: ./auth-proxy
      dockerfile: Dockerfile
    container_name: dashboard-auth-proxy
    environment:
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      BACKEND_URL: http://api:8000
      JWKS_URL: ${JWKS_URL:-http://api:8000/.well-known/jwks.json}
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

  # FastAPI backend - works with DuckDB (local) or PostgreSQL (full)
  api:
    image: dashboard-chat/api:bazel
    container_name: dashboard-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/app.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://*.gitpod.io}
      DEBUG: ${DEBUG:-true}
      MINIO_ENDPOINT: minio:9000
      AUTH_MODE: ${AUTH_MODE:-dev}
      AUTO_PROVISION_ORG: "true"
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
      TRUST_PROXY_HEADERS: "true"
      STREAM_API_KEY: ${STREAM_API_KEY:-}
      STREAM_API_SECRET: ${STREAM_API_SECRET:-}
      PG_DUCKDB_ADMIN_USER: ${PG_DUCKDB_USER:-duckdb_admin}
      PG_DUCKDB_ADMIN_PASSWORD: ${PG_DUCKDB_PASSWORD:-duckdb_secret}
      PG_DUCKDB_DATABASE: ${PG_DUCKDB_DATABASE:-dashboard_external}
      PG_DUCKDB_IMAGE: ${PG_DUCKDB_IMAGE:-pgduckdb/pgduckdb:16-main}
      PG_DUCKDB_NETWORK: ${PG_DUCKDB_NETWORK:-dashboard-chat_default}
      ENVIRONMENT_PROVISIONER: ${ENVIRONMENT_PROVISIONER:-docker}
      MINIO_INTERNAL_ENDPOINT: "minio:9000"
      PGBOUNCER_IMAGE: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:1.22}
      PGBOUNCER_PORT_RANGE_START: ${PGBOUNCER_PORT_RANGE_START:-6432}
      PGBOUNCER_PORT_RANGE_END: ${PGBOUNCER_PORT_RANGE_END:-7431}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "997"

  # Full stack with PostgreSQL
  api-full:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-api-full
    profiles: ["full"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard_secret}@db:5432/${POSTGRES_DB:-dashboard_chat}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DEBUG: ${DEBUG:-true}
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
      TRUST_PROXY_HEADERS: "true"
      PG_DUCKDB_ADMIN_USER: ${PG_DUCKDB_USER:-duckdb_admin}
      PG_DUCKDB_ADMIN_PASSWORD: ${PG_DUCKDB_PASSWORD:-duckdb_secret}
      PG_DUCKDB_DATABASE: ${PG_DUCKDB_DATABASE:-dashboard_external}
      PG_DUCKDB_IMAGE: ${PG_DUCKDB_IMAGE:-pgduckdb/pgduckdb:16-main}
      PG_DUCKDB_NETWORK: ${PG_DUCKDB_NETWORK:-dashboard-chat_default}
      ENVIRONMENT_PROVISIONER: ${ENVIRONMENT_PROVISIONER:-docker}
      MINIO_INTERNAL_ENDPOINT: "minio:9000"
      PGBOUNCER_IMAGE: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:1.22}
      STREAM_API_KEY: ${STREAM_API_KEY:-}
      STREAM_API_SECRET: ${STREAM_API_SECRET:-}
      PGBOUNCER_PORT_RANGE_START: ${PGBOUNCER_PORT_RANGE_START:-6432}
      PGBOUNCER_PORT_RANGE_END: ${PGBOUNCER_PORT_RANGE_END:-7431}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      auth-proxy:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "997"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Mirth Connect - HL7v2 to FHIR conversion engine
  mirth:
    image: nextgenhealthcare/connect:4.5
    container_name: dashboard-mirth
    profiles: ["healthcare"]
    ports:
      - "8443:8443"  # Web dashboard
      - "6661:6661"  # HL7v2 listener
    environment:
      DATABASE: derby
      DATABASE_URL: derby
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost:8443/api/server/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  backend_data:
  postgres_data:
  minio_data:
