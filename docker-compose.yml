services:
  # Redis - session write buffer
  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend - Vite dev server
  frontend:
    image: node:20-alpine
    container_name: dashboard-frontend
    working_dir: /app/frontend
    environment:
      VITE_CHAT_URL: http://localhost:8787
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-dev}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "cd /app && npm install && cd /app/frontend && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

  # Hono Worker - Chat API
  worker:
    image: node:20-slim
    container_name: dashboard-worker
    working_dir: /app
    env_file:
      - .dev.vars
    environment:
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_LOGS: dashboard-chat.logs
      S3_REGION: us-east-1
      CORS_ORIGIN: http://localhost:5173
      AUTH_MODE: ${AUTH_MODE:-dev}
    ports:
      - "8787:8787"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: bash -c "apt-get update && apt-get install -y ca-certificates && npm install && npx tsx --watch worker/index.ts"

  # PostgreSQL - for persistent storage (optional for DuckDB-only mode)
  db:
    image: postgres:16-alpine
    container_name: dashboard-postgres
    profiles: ["full", "postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage for Parquet files
  minio:
    image: minio/minio:latest
    container_name: dashboard-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # FastAPI backend - works with DuckDB (local) or PostgreSQL (full)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://*.gitpod.io}
      DEBUG: ${DEBUG:-true}
      MINIO_ENDPOINT: minio:9000
      AUTH_MODE: ${AUTH_MODE:-dev}
      AUTO_PROVISION_ORG: "true"
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/migrations:/app/migrations
      - ./backend/data:/app/data
    command: sh -c "python scripts/setup_dev.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Full stack with PostgreSQL
  api-full:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-api-full
    profiles: ["full"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard_secret}@db:5432/${POSTGRES_DB:-dashboard_chat}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DEBUG: ${DEBUG:-true}
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  minio_data:
  redis_data:
