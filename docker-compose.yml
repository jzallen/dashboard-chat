services:
  # Frontend - nginx serving Vite build
  frontend:
    image: dashboard-chat/frontend:bazel
    pull_policy: never
    container_name: dashboard-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  # Hono Agent - Chat API
  #
  # Scaling: this service holds the per-channel presentation-state log
  # (ADR-015 / F.3). When REDIS_URL is set the log is backed by Redis and a
  # directive appended on replica A is visible from a GET on replica B; when
  # unset the in-process Map fallback is single-replica only.
  #
  # Multi-replica usage (compose acceptance test):
  #     docker compose up -d --scale agent=2
  # We deliberately omit `container_name` and the fixed host port so
  # `--scale=N` works without name/port conflicts. The frontend's nginx
  # routes to the `agent:8787` service name over the compose network and
  # rides docker's round-robin DNS across replicas; the test orchestrator
  # uses `docker compose port --index N agent 8787` to hit each replica.
  agent:
    image: dashboard-chat/agent:bazel
    pull_policy: never
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGIN: http://localhost:5173
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      JWKS_URL: ${JWKS_URL:-}
      # Tool dispatchers fetch backend endpoints via the auth-proxy. The
      # service name resolves on the compose network; localhost is unreachable
      # from inside the container. Hardcoded so a host-side .env (used by
      # pytest) cannot override container-internal values via compose
      # substitution. (dc-u43)
      AUTH_PROXY_URL: http://auth-proxy:3000
      # Redis-backed ThreadEventPersister (ADR-017) and PresentationStateLog
      # (F.3). Compose dev runs the Redis path byte-identically to
      # prod-without-Stream.io. Hardcoded — see AUTH_PROXY_URL above.
      REDIS_URL: redis://redis:6379/0
      PRESENTATION_STATE_MAXLEN: ${PRESENTATION_STATE_MAXLEN:-1000}
    ports:
      # Fixed host port so AGENT_URL in .env stays stable across `compose up`.
      # Override AGENT_HOST_PORT in .env if 1041 collides. Note: a fixed host
      # port precludes scaling this service beyond 1 replica.
      - "${AGENT_HOST_PORT:-1041}:8787"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostgreSQL - for persistent storage (optional for DuckDB-only mode)
  db:
    image: postgres:18
    container_name: dashboard-postgres
    profiles: ["full", "postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Query Engine - persistent pg_duckdb analytical query layer
  query-engine:
    image: pgduckdb/pgduckdb:16-main
    container_name: dashboard-query-engine
    environment:
      POSTGRES_USER: ${QUERY_ENGINE_ADMIN_USER:-duckdb_admin}
      POSTGRES_PASSWORD: ${QUERY_ENGINE_ADMIN_PASSWORD:-duckdb_secret}
      POSTGRES_DB: ${QUERY_ENGINE_DATABASE:-dashboard_external}
    volumes:
      - query_engine_data:/var/lib/postgresql/data
      - ./backend/sql/init-query-engine.sql:/docker-entrypoint-initdb.d/init-query-engine.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUERY_ENGINE_ADMIN_USER:-duckdb_admin} -d ${QUERY_ENGINE_DATABASE:-dashboard_external}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # MinIO - S3-compatible object storage for Parquet files
  minio:
    image: minio/minio:latest
    container_name: dashboard-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis - durable replay-event log for the SessionEventReader (ADR-017).
  # The agent writes via RedisThreadPersister.persist (XADD); the api reads
  # via RedisSessionEventReader.get_events (XRANGE).
  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Flow-State Tier — XState v5 actors + Redis-backed FlowEvent log.
  # Per ADR-030 §SD2: mandatory single replica (actors are in-process).
  # Per ADR-030 §SD1: reachable only via auth-proxy at /flow-state/*.
  #
  # Built locally from ./flow-state/Dockerfile — no Bazel image yet for this
  # new tier; the Bazel-built `:bazel` tag pattern will land in a follow-up.
  flow-state:
    build: ./flow-state
    container_name: dashboard-flow-state
    profiles: ["flow-state", "full"]
    environment:
      PORT: "8788"
      REDIS_URL: redis://redis:6379/1
      # Loopback HTTP to the fake WorkOS server the acceptance suite starts
      # in-process. Override per scenario via compose env file.
      FAKE_WORKOS_URL: ${FAKE_WORKOS_URL:-http://host.docker.internal:14299}
      AUTH_MODE: ${AUTH_MODE:-dev}
      FLOW_EVENT_MAXLEN: ${FLOW_EVENT_MAXLEN:-1000}
      # Backend URL the create-org-and-reissue actor calls on Maya's behalf.
      # Default targets the api service on the compose network.
      BACKEND_URL: ${FLOW_STATE_BACKEND_URL:-http://api:8000}
      # Enable per-request harness knobs (forced reissue failures, etc.)
      # for the acceptance suite. Production deployments leave this unset.
      NWAVE_HARNESS_KNOBS: ${NWAVE_HARNESS_KNOBS:-true}
    ports:
      # Fixed host port so FLOW_STATE_URL stays stable across compose up.
      - "${FLOW_STATE_HOST_PORT:-1043}:8788"
    extra_hosts:
      # Lets the container resolve host.docker.internal on Linux (needed for
      # the in-process fake WorkOS server running on the host).
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  # Auth Proxy - validates tokens and forwards identity headers.
  #
  # Scaling: this service is stateless w.r.t. proxied requests, but the
  # token-signing keypair must be shared across replicas — otherwise
  # tokens minted by replica A fail verification at replica B. The
  # `auth_proxy_secrets` volume holds the persisted JWK keypair; the
  # FileSecretsProvider (default) reads/writes there. Production
  # deployments running >1 replica should switch to a remote provider
  # (AUTH_PROXY_SECRETS_PROVIDER=vault) backed by an actual secrets
  # manager — the file mount is acceptable for compose-local scaling
  # but not durable across hosts.
  #
  # Multi-replica usage (compose acceptance test):
  #     docker compose up -d --scale auth-proxy=2
  # We deliberately omit `container_name` and the fixed host port so
  # `--scale=N` works without name/port conflicts. The api service
  # reaches auth-proxy via the compose network; the test orchestrator
  # uses `docker compose exec` (or container IPs) to hit each replica.
  auth-proxy:
    image: dashboard-chat/auth-proxy:bazel
    pull_policy: never
    environment:
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      BACKEND_URL: http://api:8000
      # Upstream for the /flow-state/* multi-upstream rule (ADR-030 §SD1).
      # Container-internal; .env host-port overrides do not leak in.
      FLOW_STATE_URL: http://flow-state:8788
      JWKS_URL: ${JWKS_URL:-}
      PORT: "3000"
      M2M_ENABLED: ${M2M_ENABLED:-true}
      AUTH_PROXY_KEYPAIR_PATH: /var/lib/auth-proxy/keypair.json
    ports:
      # Fixed host port so AUTH_PROXY_URL in .env stays stable across `compose up`.
      # Override AUTH_PROXY_HOST_PORT in .env if 1042 collides.
      - "${AUTH_PROXY_HOST_PORT:-1042}:3000"
    volumes:
      - auth_proxy_secrets:/var/lib/auth-proxy
    depends_on:
      - api

  # FastAPI backend - works with DuckDB (local) or PostgreSQL (full)
  api:
    image: dashboard-chat/api:bazel
    pull_policy: never
    container_name: dashboard-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/app.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://*.gitpod.io}
      DEBUG: ${DEBUG:-true}
      MINIO_ENDPOINT: minio:9000
      AUTH_MODE: ${AUTH_MODE:-dev}
      AUTO_PROVISION_ORG: "true"
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
      TRUST_PROXY_HEADERS: "true"
      # SessionEventReader dispatch (ADR-017). Hardcoded so a host-side
      # .env (used by pytest) cannot override container-internal values
      # via compose substitution. (dc-u43)
      REDIS_URL: redis://redis:6379/0
      PG_DUCKDB_ADMIN_USER: ${PG_DUCKDB_USER:-duckdb_admin}
      PG_DUCKDB_ADMIN_PASSWORD: ${PG_DUCKDB_PASSWORD:-duckdb_secret}
      PG_DUCKDB_DATABASE: ${PG_DUCKDB_DATABASE:-dashboard_external}
      PG_DUCKDB_IMAGE: ${PG_DUCKDB_IMAGE:-pgduckdb/pgduckdb:16-main}
      PG_DUCKDB_NETWORK: ${PG_DUCKDB_NETWORK:-dashboard-chat_default}
      ENVIRONMENT_PROVISIONER: ${ENVIRONMENT_PROVISIONER:-docker}
      MINIO_INTERNAL_ENDPOINT: "minio:9000"
      PGBOUNCER_IMAGE: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:1.22}
      PGBOUNCER_PORT_RANGE_START: ${PGBOUNCER_PORT_RANGE_START:-6432}
      PGBOUNCER_PORT_RANGE_END: ${PGBOUNCER_PORT_RANGE_END:-7431}
      # Container-internal — hardcoded so .env host-port overrides (e.g.,
      # QUERY_ENGINE_PORT=5433 for host pytest) don't leak into the api
      # container, which talks to query-engine over the compose network. (dc-u43)
      QUERY_ENGINE_HOST: query-engine
      QUERY_ENGINE_PORT: "5432"
      QUERY_ENGINE_ADMIN_USER: ${QUERY_ENGINE_ADMIN_USER:-duckdb_admin}
      QUERY_ENGINE_ADMIN_PASSWORD: ${QUERY_ENGINE_ADMIN_PASSWORD:-duckdb_secret}
      QUERY_ENGINE_DATABASE: ${QUERY_ENGINE_DATABASE:-dashboard_external}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    depends_on:
      query-engine:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Full stack with PostgreSQL
  api-full:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-api-full
    profiles: ["full"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard_secret}@db:5432/${POSTGRES_DB:-dashboard_chat}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DEBUG: ${DEBUG:-true}
      AUTH_MODE: ${AUTH_MODE:-dev}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:5173/auth/callback}
      TRUST_PROXY_HEADERS: "true"
      PG_DUCKDB_ADMIN_USER: ${PG_DUCKDB_USER:-duckdb_admin}
      PG_DUCKDB_ADMIN_PASSWORD: ${PG_DUCKDB_PASSWORD:-duckdb_secret}
      PG_DUCKDB_DATABASE: ${PG_DUCKDB_DATABASE:-dashboard_external}
      PG_DUCKDB_IMAGE: ${PG_DUCKDB_IMAGE:-pgduckdb/pgduckdb:16-main}
      PG_DUCKDB_NETWORK: ${PG_DUCKDB_NETWORK:-dashboard-chat_default}
      ENVIRONMENT_PROVISIONER: ${ENVIRONMENT_PROVISIONER:-docker}
      MINIO_INTERNAL_ENDPOINT: "minio:9000"
      PGBOUNCER_IMAGE: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:1.22}
      PGBOUNCER_PORT_RANGE_START: ${PGBOUNCER_PORT_RANGE_START:-6432}
      PGBOUNCER_PORT_RANGE_END: ${PGBOUNCER_PORT_RANGE_END:-7431}
      # Container-internal — see api block above. (dc-u43)
      QUERY_ENGINE_HOST: query-engine
      QUERY_ENGINE_PORT: "5432"
      QUERY_ENGINE_ADMIN_USER: ${QUERY_ENGINE_ADMIN_USER:-duckdb_admin}
      QUERY_ENGINE_ADMIN_PASSWORD: ${QUERY_ENGINE_ADMIN_PASSWORD:-duckdb_secret}
      QUERY_ENGINE_DATABASE: ${QUERY_ENGINE_DATABASE:-dashboard_external}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      auth-proxy:
        condition: service_started
      query-engine:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/data:/app/data
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Mirth Connect - HL7v2 to FHIR conversion engine
  mirth:
    image: nextgenhealthcare/connect:4.5
    container_name: dashboard-mirth
    profiles: ["healthcare"]
    ports:
      - "8443:8443"  # Web dashboard
      - "6661:6661"  # HL7v2 listener
    environment:
      DATABASE: derby
      DATABASE_URL: derby
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost:8443/api/server/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  backend_data:
  postgres_data:
  minio_data:
  query_engine_data:
  redis_data:
  auth_proxy_secrets:
