    - "The option matrix (OQ-1 Round-2) is decision-ready for DESIGN. All five options carry effort estimates, scope-chain expressibility scores, and lock-in risk. The user-signalled lean (Inertia/Remix) is recorded but does not substitute for DESIGN's own scoring."
    - "active_scope is the highest-leverage architectural simplification this DISCUSS produces. If the framework choice does not naturally express it, the option fails the criterion regardless of other strengths."

