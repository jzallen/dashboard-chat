design_wave_routing_notes:
  - "The single HIGH issue (WCAG accessibility on recoverable-error panel) is routed to DESIGN as a UX deliverable; it does not block DISCUSS handoff because the panel itself is a DESIGN deliverable."
  - "Two medium issues (defining 'projection'; making 'no flicker' design-enforced) are routed to DESIGN as design pressures, not requirements."
  - "Baseline-instrumentation gap is routed to DEVOPS (platform-architect) per outcome-kpis.md handoff section."

caveats:
  - "This review was performed by the same agent that produced the artifacts. Confirmation bias is structurally inevitable. The orchestrator should re-run nw-product-owner-reviewer as an independent peer review before merging. The structured findings above are intended to give that reviewer a starting point, not to substitute for them."

# -----------------------------------------------------------------------------
# Round-2 self-review (2026-05-11, post-iteration)
# -----------------------------------------------------------------------------
# The first DISCUSS pass was APPROVED by an independent reviewer (Eclipse). The
# user surfaced two additive constraints (D8 agent-stays-the-chat-brain;
# D9 cross-cutting scope chain). This Round-2 self-review applies
# nw-po-review-dimensions to the iteration deltas only. The Round-1 findings
# above remain valid.

round_2_review:
  review_id: "req_rev_20260511_user_flow_state_machines_round_2"
  reviewer: "product-owner (Luna, self-review of Round-2 iteration; the orchestrator should re-invoke nw-product-owner-reviewer for independent peer review before merging)"
  artifact: "docs/feature/user-flow-state-machines/discuss/ (Round-2 deltas only)"
  iteration: 2
  baseline: "Round-1 was APPROVED by independent reviewer (Eclipse)."

  scope_of_iteration:
    - "wave-decisions.md — added §D8 (agent stays chat brain), §D9 (scope chain), R5/R6 risks."
    - "handoff-design.md — replaced OQ-1/OQ-2 with framework-choice option matrix (5 options); added OQ-8 (scope-chain expressibility); added §Round-2 'Scope-chain expressibility' section; updated suggested DESIGN deliverables."
    - "shared-artifacts-registry.md — added `active_scope` HIGH-risk cross-cutting artifact; added 2 DESIGN-deferred validation checks."
    - "journey-inventory.md — added per-flow scope dependency annotations; added Round-2 scope dependency summary table."
    - "user-stories.md — added System Constraints #6 (scope chain) and #7 (agent stays chat brain); reframed US-002 to make scope chips load-bearing (added 2 scenarios, 2 ACs, extended K2); extended US-004 with assert_scope surface (added 2 scenarios, 2 ACs)."
    - "dor-validation.md — re-validated US-002 and US-004 against new ACs; both PASS at upper-boundary; clean split path documented."

  strengths_of_iteration:
    - "The architectural option matrix in handoff-design.md is scored across two explicit criteria (server-owned-state fitness AND scope-chain expressibility), not just effort — this prevents the DESIGN wave from picking on ergonomic grounds and then being surprised when scope drift returns."
    - "active_scope is documented HIGH-risk with the concrete bug class named (the ChatView project-context race from the recent debugging session) — the risk has a real-world receipt."
    - "The agent contract is preserved verbatim from the user directive (D8) AND made testable via US-002's agent-scope-rejection AC and US-004's missing-scope-diagnostic AC — the constraint is not aspirational."
    - "Per-flow scope dependency annotations in journey-inventory.md mean every future DISCUSS pass on flows 2-7 inherits the contract automatically; the scope chain becomes part of the inventory schema, not just a deep-dive concern."
    - "Both extended stories (US-002, US-004) carry explicit story-size notes naming the clean split if they grow beyond 3 days — Elephant Carpaccio discipline is preserved at the boundary."

  issues_identified:
    confirmation_bias:
      - issue: "The framework-option matrix in handoff-design.md explicitly names a 'user-signalled lean' toward Inertia/Remix. A reviewer could call this PO confirmation bias — recording the user's preference shape risks the DESIGN wave anchoring on it rather than running a fresh comparison."
        severity: "low"
        location: "handoff-design.md §OQ-1 (Round-2)"
        recommendation: "Acceptable because (a) the PO's job is to surface the user's preference shape, not pick the framework; (b) the matrix scores all five options on objective criteria (server-owned-state fitness, scope-chain expressibility, effort, lock-in, agent compatibility) — DESIGN must score each option against those criteria, not against the lean. Lean is a tiebreaker, not a thumb on the scale."
        remediation_status: "accepted as-is; the framing distinguishes 'user preference shape' from 'recommendation'."

      - issue: "The Round-2 additions to US-002 lean heavily on the project-chip-on-deep-link case being a real high-frequency event. The team's recent debugging session produced anecdotal evidence ('ChatView project-context race'); the instrumented frequency is unknown."
        severity: "low"
        location: "user-stories.md §US-002 Outcome KPIs"
        recommendation: "Acceptable — the baseline language in US-002 KPI explicitly calls this out as 'anecdotally common'. The DEVOPS instrumentation in outcome-kpis.md will produce the real frequency before/after the framework lands. No remediation needed."
        remediation_status: "accepted; honest baseline language preserved."

    completeness_gaps:
      - issue: "outcome-kpis.md was NOT updated to include the project-chip-on-cold-load metric extension. K2's measurement plan still names `org_chip_value` and `user_chip_value` only — not `project_chip_value`."
        severity: "medium"
        location: "outcome-kpis.md (not touched by Round-2)"
        recommendation: "The orchestrator's iteration instructions explicitly named outcome-kpis.md as 'do NOT touch (unless scope-chip first-paint becomes a new K)'. The project-chip first-paint is an EXTENSION of K2, not a new K — it deepens K2's definition rather than adding K6. The K2 measurement plan needs a one-line addition: `project_chip_value` field on `app_shell_first_paint`. Flagged as MEDIUM for DEVOPS handoff resolution; not blocking DESIGN handoff because outcome-kpis.md's DEVOPS instrumentation list IS already in scope for refinement before instrumentation lands."
        remediation_status: "FLAGGED — recommend a follow-up edit to outcome-kpis.md K2 instrumentation section adding `project_chip_value` field; or DEVOPS adds it during instrumentation spike. Not blocking."

      - issue: "story-map.md was NOT updated. The orchestrator's instructions said 'do NOT touch unless reframing US-002 changes the slice carving.' The reframe extends US-002's scope but does NOT change which slice it lives in (still Slice 1, walking-skeleton). No edit required."
        severity: "low"
        location: "story-map.md (intentionally not touched)"
        recommendation: "Verify: US-002 stays in Slice 1 (walking skeleton). Its acceptance criteria grew but its slice membership did not. No edit needed. The Round-2 scope-chip ACs are part of the walking skeleton because they are mechanically enforced by the framework choice — they are not a separate slice."
        remediation_status: "verified — no edit needed."

      - issue: "The journey-login-and-org-setup-visual.md and .yaml were NOT updated. The Round-2 reframe of US-002 changes what the app shell shows on first paint (adds a project chip). The visual mockup of step 4 (post-org-creation app shell) may need a project chip annotation."
        severity: "medium"
        location: "journey-login-and-org-setup-visual.md (intentionally not touched per orchestrator instructions)"
        recommendation: "Orchestrator explicitly said 'unless the scope chip changes require updating the app-shell mockup — if so, surgical edit'. The minimal surgical edit would add a single annotation in step 4's mockup that the chip set is `org / user / (project when one is open)`. Defer to next iteration or to DESIGN — the journey artifact is a working hypothesis at this stage and DESIGN owns the actual rendering."
        remediation_status: "DEFERRED — DESIGN may update visual-mockup as part of the framework-choice exercise; or the next DISCUSS pass updates it. Not blocking DESIGN handoff because the journey artifact's authoritative ACs already capture the change via US-002."

    clarity_issues:
      - issue: "Two terms have been introduced that need glossary entries the next time the DISCUSS artifacts are touched: 'scope resolver' (the framework-specific mechanism producing `active_scope`) and 'scope chain' (the parent-child hierarchy Org→Project→Resource)."
        severity: "low"
        location: "Multiple files"
        recommendation: "Acceptable for this iteration — both terms are defined inline where used. A formal glossary belongs in DESIGN's domain-model deliverable."
        remediation_status: "DEFERRED to DESIGN domain model."

    testability_concerns:
      - issue: "US-002's new AC 'the project chip never resolves AFTER the page body or vice versa' requires measuring two paint events relative to each other. 'Same first paint' is a clear human-observable property but the instrumentation needs DESIGN to pin down the measurement boundary."
        severity: "medium"
        location: "user-stories.md §US-002 AC (Round-2)"
        recommendation: "Same shape as the Round-1 100ms timing finding (testable in principle, DESIGN names the boundary). Render-after-projection-populated (suspense-style) is the framework-enforced answer if options C/D/E are chosen — flicker is mechanically impossible by construction, not detected after the fact."
        remediation_status: "DEFERRED to DESIGN as a design pressure (same as Round-1 finding on 'no flicker')."

      - issue: "US-004's new AC 'the harness surfaces missing-scope diagnostics on the agent contract' presumes the agent invocations are observable from the harness. The harness today does not intercept agent-bound HTTP — it observes the same projection endpoint."
        severity: "medium"
        location: "user-stories.md §US-004 AC (Round-2)"
        recommendation: "Either the harness gains a thin agent-invocation tap (allowed under ADR-016 because it is the SAME ingress as production), OR the agent itself emits a `scope_validation_failed` event that the harness reads from the projection. Both are acceptable DESIGN choices; the AC is testable under either."
        remediation_status: "DEFERRED to DESIGN."

    priority_validation:
      q1_largest_bottleneck: "YES — the ChatView project-context race is named in the user's directive AND is the same shape as the JWKS warm-up race that motivated Round-1. The scope-chain artifact addresses the root cause class (FE re-derivation of authoritative server state), not just a symptom."
      q2_simple_alternatives: "ADEQUATE — the option matrix in handoff-design.md scores all five framework alternatives explicitly. The user has ruled out one (agent-as-host) by directive; the remaining four are scored on objective criteria."
      q3_constraint_prioritization: "CORRECT — D9 names the scope chain as a load-bearing constraint that ranks ABOVE framework ergonomics. This is the correct prioritization: drift cost dominates ergonomic cost over the life of the codebase."
      q4_data_justified: "NO_DATA on the project-chip flicker frequency (developer recall only). Same remediation as Round-1: instrument before/with the framework. Not a verdict-blocker."
      verdict: "PASS"

  approval_status: "approved"
  critical_issues_count: 0
