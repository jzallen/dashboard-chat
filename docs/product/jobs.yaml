schema_version: 1
# SSOT for validated Jobs-to-be-Done across the Dashboard Chat product.
# Bootstrapped 2026-05-08 by feature `dbt-test-validation` (DIVERGE Phase 1).
# Ownership: Mayor (Zach Allen). Update via DIVERGE Phase 1 of any future feature.

jobs:
  - id: JOB-001
    title: Validate chat-driven workflows across the eject-to-dbt boundary
    feature_id: dbt-test-validation
    abstraction_layer: strategic
    statement: >
      When a chat-driven user workflow modifies the staging layer of a dataset,
      I want to validate that the resulting staged data matches the intended
      outcome contract using assertions that remain valid after the project is
      ejected to dbt, so I can ship workflow changes (chat protocol, transforms,
      dispatcher logic) without inventing a parallel validation path inside and
      outside the application.
    emotional_layer: >
      When an integration test fails, I want to know within seconds whether the
      failure is a workflow problem or a data problem, so I can triage without
      spelunking through SSE traces and pandas dataframes side-by-side.
    social_layer: >
      When I show this codebase to a data engineer hire, I want the test
      artifacts to look like the validation they already write at their day job
      (dbt tests, schema contracts, expectations).
    outcome_statements:
      - id: O1
        text: Minimize the time it takes to discover that a chat-driven workflow produced incorrect staged data
        importance: 9
        satisfaction: 6
        score: 12
        status: marginal
      - id: O2
        text: Minimize the likelihood that an assertion holds against the API response but fails against the staged data
        importance: 8
        satisfaction: 5
        score: 11
        status: marginal
      - id: O3
        text: Minimize the effort required to keep the test suite valid when the chat protocol changes
        importance: 9
        satisfaction: 3
        score: 15
        status: under-served
      - id: O4
        text: Maximize the reuse of validation logic between in-application tests and the customer's ejected dbt project
        importance: 9
        satisfaction: 2
        score: 16
        status: under-served
      - id: O5
        text: Minimize the marginal cost of adding the next user-flow test
        importance: 8
        satisfaction: 4
        score: 12
        status: marginal
      - id: O6
        text: Minimize the time it takes to triage a failing test as workflow-vs-data
        importance: 7
        satisfaction: 5
        score: 9
        status: appropriately-served
    references:
      - docs/feature/dbt-test-validation/diverge/job-analysis.md
      - docs/evolution/2026-05-01-api-driven-user-flow-tests.md
      - docs/evolution/2026-05-07-refactor-dataset-layer-harness.md
      - features/dbt-project-export.feature
      - features/dbt-model-layers.feature

  - id: JOB-002
    title: Drive every user flow through a server-owned state machine that UI and tests share
    feature_id: user-flow-state-machines
    abstraction_layer: strategic
    statement: >
      When a Dashboard Chat user moves through any of the product's flows
      (auth, org setup, project/session management, upload, preview,
      transforms, view/report, dbt export), I want the flow's state to be
      owned by a single server-driven state machine — drivable from the
      Node server, projected to the UI, and assertable by a TS headless
      harness — so that the presentation layer is a thin consumer of a
      single source of truth instead of N React state machines that
      re-derive flow logic and drift from production.
    emotional_layer: >
      When I add a new user flow OR a new flow test, I want the marginal
      cost to be defining one new machine — not editing N coordinated
      places (FE component state, FE test setup, Python integration
      harness, agent prompts).
    social_layer: >
      When I show this codebase to a new contributor, I want flow state
      to look like one obvious file per flow — not a spelunk through
      React components, TanStack Query keys, and Python harness adapters
      to reconstruct what "logged in and org set up" means.
    outcome_statements:
      # Scoring is provisional — DISCUSS-derived, not ODI-rigorous. A
      # formal DIVERGE pass (if/when revisited) would interview real
      # users to confirm importance + measure satisfaction. For now
      # importance reflects developer + user impact intuition and
      # satisfaction reflects current observable state.
      - id: O1
        text: Minimize the time it takes to add a new user flow's headless test
        importance: 9
        satisfaction: 2
        score: 16
        status: under-served
      - id: O2
        text: Minimize the divergence between what the UI shows and what a headless test asserts
        importance: 9
        satisfaction: 3
        score: 15
        status: under-served
      - id: O3
        text: Minimize the cost of changing one flow's transition rules (one place, not N)
        importance: 8
        satisfaction: 3
        score: 13
        status: under-served
      - id: O4
        text: Minimize the time-to-recovery when a flow hits an unexpected state (visible error UI + same error from the harness)
        importance: 7
        satisfaction: 4
        score: 10
        status: marginal
      - id: O5
        text: Maximize the reuse of flow assertions between the in-app dev TS harness and the acceptance Python integration suite
        importance: 8
        satisfaction: 4
        score: 12
        status: marginal
    composition_with_other_jobs:
      - related_job: JOB-001
        relationship: >
          Compositional — JOB-001's under-served outcomes O3 (effort to keep
          tests valid when chat protocol changes), O4 (reuse of validation
          logic between in-app tests and ejected dbt), and O5 (marginal cost
          of next user-flow test) are directly improved by JOB-002. The
          existing Python integration harness (DatasetLayerHarness) remains
          the backend+agent contract guard for JOB-001; the new TS harness
          composed on top of the state-machine layer is the user-flow surface
          for JOB-002. Both observe the same server-owned machines.
    references:
      - docs/feature/user-flow-state-machines/discuss/wave-decisions.md
      - docs/feature/user-flow-state-machines/discuss/journey-inventory.md
      - docs/feature/user-flow-state-machines/discuss/journey-login-and-org-setup-visual.md
      - docs/feature/user-flow-state-machines/discuss/journey-login-and-org-setup.yaml
      - docs/feature/user-flow-state-machines/discuss/story-map.md
      - docs/feature/user-flow-state-machines/discuss/user-stories.md
      - docs/feature/user-flow-state-machines/discuss/outcome-kpis.md
      - docs/feature/user-flow-state-machines/discuss/shared-artifacts-registry.md
      - docs/product/journeys/login-and-org-setup.yaml
      - docs/product/journeys/_inventory.md
      - docs/decisions/adr-015-headless-presentation-state-retrieval.md

  - id: JOB-003
    title: Keep dataset staging changes tool-agnostic and deterministic through a canonical operations IR
    feature_id: transform-operations-ir
    abstraction_layer: strategic
    statement: >
      When I change a dataset's staging layer — authoring operations directly or
      importing them from an Excel / Power Query (M) script — I want those changes
      captured as one canonical, ordered list of neutral operations that
      deterministically renders to ibis (and onward to DuckDB preview and ejected
      dbt SQL), so I can trust that the preview I see, the dbt I eject, and the M I
      imported all describe the same intent — without any single tool's dialect
      leaking into the stored source of truth.
    emotional_layer: >
      When I import, add, or reorder an operation, I want to learn immediately — at
      the moment I submit it — whether it is well-formed and will render, instead of
      discovering a "-- Error generating SQL" comment buried in a preview later, or
      a silently reordered transform that produces the wrong column.
    social_layer: >
      When I show this codebase to a data engineer, I want the staging layer to read
      like a clean compiler IR — operations are data, rendering is code, SQL is
      always derived — not a pile of triplicated match statements whose execution
      order is pinned to a row's insert timestamp.
    outcome_statements:
      # Provisional scoring — DISCUSS-derived from ADR-051 evidence, not ODI-rigorous.
      # importance reflects developer + correctness impact; satisfaction reflects the
      # current observable state grounded in evaluation.md file:line evidence.
      - id: O1
        text: Minimize the likelihood that two non-commutative staging operations render in the wrong (clock-derived) order
        importance: 9
        satisfaction: 3
        score: 15
        status: under-served
      - id: O2
        text: Minimize the likelihood that a malformed operation is persisted and silently degrades to broken SQL
        importance: 8
        satisfaction: 2
        score: 14
        status: under-served
      - id: O3
        text: Minimize the effort required to add a new operation or a new render target without drift between rule arms
        importance: 7
        satisfaction: 3
        score: 11
        status: marginal
      - id: O4
        text: Maximize fidelity between a target's render and the neutral customer intent (no dialect leak into the stored IR)
        importance: 8
        satisfaction: 4
        score: 12
        status: marginal
      - id: O5
        text: Minimize the likelihood that importing an Excel / M script silently drops or half-imports an unsupported construct
        importance: 8
        satisfaction: 2
        score: 14
        status: under-served
    composition_with_other_jobs:
      - related_job: JOB-001
        relationship: >
          Foundational — JOB-001's under-served O4 (reuse of validation logic
          between in-app tests and the ejected dbt project) depends on the
          reproducibility invariant JOB-003 establishes: because ibis/SQL are a
          pure function of the persisted operations, the same operations render
          identically inside the app (DuckDB preview) and after eject (dbt
          staging). Without a deterministic IR, an assertion that holds in-app can
          diverge post-eject.
      - related_job: JOB-002
        relationship: >
          Compositional — the provisional J-005 journey (Transform toggles:
          preview / apply / undo) is the user-flow surface; JOB-003's canonical
          operations list is the server-owned source of truth that journey's state
          machine projects. JOB-002 owns the flow state; JOB-003 owns what that
          state is made of.
    references:
      - docs/feature/transform-operations-ir/design/evaluation.md
      - docs/feature/transform-operations-ir/design/c4-component.md
      - docs/feature/transform-operations-ir/design/wave-decisions.md
      - docs/feature/transform-operations-ir/discuss/jtbd-job-stories.md
      - docs/feature/transform-operations-ir/discuss/jtbd-four-forces.md
      - docs/feature/transform-operations-ir/discuss/user-stories.md
      - docs/feature/transform-operations-ir/discuss/story-map.md
      - docs/feature/transform-operations-ir/discuss/outcome-kpis.md
      - docs/decisions/adr-051-operations-as-canonical-transform-ir.md
      - docs/decisions/adr-007-ibis-for-sql-generation.md
      - docs/decisions/adr-026-ibis-as-only-sql-compiler.md

  - id: JOB-004
    title: Trace any request and audit any decision across services through consistent, correlatable logs
    feature_id: log-coverage-and-quality
    abstraction_layer: strategic
    statement: >
      When something goes wrong (or I need to prove something went right) anywhere
      across the five runtime surfaces — agent, auth-proxy, backend, ui, ui-state —
      I want every critical path to emit consistent, structured, correlatable
      INFO/DEBUG/WARN/ERROR logs that share one envelope and one request-spanning
      correlation id, so I can follow a single user action end-to-end and read the
      reason for every auth and business decision — instead of finding silence on
      the failure path or noise with no context.
    emotional_layer: >
      When a user reports "the chat just failed", I want to grep one id and see the
      whole path light up — which hop failed and why — within minutes, instead of
      spelunking four services' stdout side-by-side and finding that the one
      decision I care about was never logged at all.
    social_layer: >
      When I hand this codebase to an on-call engineer or a security reviewer, I
      want the logs to read like an audit trail they already trust — stable event
      keys, tenant context, no secrets — not a pile of ad-hoc console.log debris
      that proves the author was debugging, not that the system is observable.
    outcome_statements:
      # Provisional scoring — DISCUSS-derived from the DC-103 audit (file:line
      # evidence in docs/feature/log-coverage-and-quality/discuss/), not an
      # ODI-rigorous study. Importance reflects operator + security + developer
      # impact; satisfaction reflects the current observable state per the audit.
      - id: O1
        text: Minimize the time it takes to localize which service/hop caused a user-reported failure
        importance: 9
        satisfaction: 2
        score: 16
        status: under-served
      - id: O2
        text: Minimize the likelihood that an auth/authorization decision is rejected (or granted) with no logged reason
        importance: 9
        satisfaction: 1
        score: 17
        status: under-served
      - id: O3
        text: Minimize the likelihood that a failure on a critical path is swallowed silently (empty catch / unlogged exception)
        importance: 8
        satisfaction: 3
        score: 13
        status: under-served
      - id: O4
        text: Minimize the effort required to confirm a critical happy path executed correctly without attaching a debugger
        importance: 7
        satisfaction: 3
        score: 11
        status: marginal
      - id: O5
        text: Minimize the likelihood that a log line leaks a secret, token, cookie, or PII as logging coverage expands
        importance: 9
        satisfaction: 7
        score: 11
        status: marginal
      - id: O6
        text: Minimize the effort required to raise log verbosity in production during an incident (no redeploy)
        importance: 7
        satisfaction: 3
        score: 11
        status: marginal
    composition_with_other_jobs:
      - related_job: JOB-002
        relationship: >
          Compositional — JOB-002's server-owned flow machines (ui-state) are a
          primary surface this job instruments. JOB-002's O4 (time-to-recovery when
          a flow hits an unexpected state) depends on the same transition/error
          logging this job generalizes from ui-state's existing requestIdMiddleware
          + logTransition pattern to every service.
      - related_job: JOB-001
        relationship: >
          Supportive — JOB-001's "triage a failing test as workflow-vs-data within
          seconds" (O6) is directly served by correlatable, structured logs that
          mark the workflow boundary an integration test crosses.
    references:
      - docs/feature/log-coverage-and-quality/discuss/jtbd-job-stories.md
      - docs/feature/log-coverage-and-quality/discuss/jtbd-four-forces.md
      - docs/feature/log-coverage-and-quality/discuss/user-stories.md
      - docs/feature/log-coverage-and-quality/discuss/story-map.md
      - docs/feature/log-coverage-and-quality/discuss/outcome-kpis.md
      - docs/feature/log-coverage-and-quality/discuss/journey-observability-sweep.yaml
      - docs/evolution/2026-05-04-log-image-identity-on-startup.md
      - ui/app/lib/log.ts

  - id: JOB-005
    title: Carry each org's catalog on a standard Iceberg REST catalog that materializes tables from Ibis-compiled SQL
    feature_id: lakekeeper-catalog-backend
    abstraction_layer: strategic
    statement: >
      When I run a per-org data stack and need a data engineer to consume our
      chat-authored datasets in their own tools, I want each org's catalog, physical
      table schema, storage credentials, and data-version history carried by a
      standard Iceberg REST catalog (LakeKeeper) that materializes tables from our
      Ibis-compiled SQL, so I can hand a data engineer real, evolvable Iceberg tables
      in a protocol their tools already speak — without hand-rolling schema_config
      JSON, without a bespoke per-org BI-provisioning dance, and without ever letting
      the catalog become a render-time authority that would break the
      operations-as-data determinism invariant.
    emotional_layer: >
      When I materialize a dataset as an Iceberg table, I want to prove — not hope —
      that materializing did not quietly turn the catalog into a source of truth: a
      determinism probe passes with LakeKeeper offline and the re-derived table equals
      the materialized one. And I want relief from carrying a second identity/tenancy
      authority that must be kept in sync by hand.
    social_layer: >
      When I show this to a data engineer, I want the catalog to read like the Iceberg
      lakehouse they already live in — a standard REST catalog, evolvable table
      schemas, snapshot history for free — not a proprietary Parquet-on-S3 layout plus
      a hand-rolled schema_config blob and a dbt-zip export.
    outcome_statements:
      # Provisional scoring — DISCUSS-derived (light JTBD bridge, no DIVERGE), grounded
      # in the DC-139 DISCOVER buy-vs-build.md file:line/ADR evidence, NOT an
      # ODI-rigorous study. Importance reflects operator + data-engineer + correctness
      # impact; satisfaction reflects the current observable state (hand-rolled
      # schema_config JSON, per-org pg_duckdb provisioning, no catalog protocol).
      - id: O1
        text: Minimize the per-org/per-project BI-provisioning surface required before a consumer can read a dataset
        importance: 8
        satisfaction: 3
        score: 13
        status: under-served
      - id: O2
        text: Maximize the credibility and standardness of the data-engineer handoff (real Iceberg tables in a REST catalog vs a dbt-zip over raw Parquet)
        importance: 8
        satisfaction: 2
        score: 14
        status: under-served
      - id: O3
        text: Minimize the effort to materialize a settled dataset as a queryable table without a new heavy runtime dependency (no dbt runtime)
        importance: 7
        satisfaction: 4
        score: 11
        status: marginal
      - id: O4
        text: Minimize the likelihood that materializing a table erodes the operations-as-data determinism invariant (catalog must never be a render-time authority)
        importance: 9
        satisfaction: 5
        score: 14
        status: under-served
      - id: O5
        text: Minimize the time-to-first-Iceberg-read for a data engineer (steps from "table exists" to "rows returned")
        importance: 7
        satisfaction: 3
        score: 11
        status: marginal
    composition_with_other_jobs:
      - related_job: JOB-003
        relationship: >
          Foundational — JOB-005's materialization corollary depends on the
          reproducibility invariant JOB-003 establishes (operations are the
          deterministic source of truth; Ibis is the only compiler, ADR-051/026). The
          materialized Iceberg table is a derived cache re-derivable from the same
          operations JOB-003 canonicalizes; the determinism probe (JOB-005 O4) is the
          ADR-051-style reproducibility probe extended to pass with the external
          catalog offline.
      - related_job: JOB-001
        relationship: >
          Supportive — JOB-001's eject-to-dbt handoff credibility (O4) is strengthened
          when the handoff is real Iceberg tables in a standard catalog, not only a
          dbt-zip. dbt stays the optional eject/handoff format; JOB-005 adds a live
          cataloged surface beside it.
    references:
      - docs/feature/lakekeeper-catalog-backend/discover/buy-vs-build.md
      - docs/feature/lakekeeper-catalog-backend/discover/problem-validation.md
      - docs/feature/lakekeeper-catalog-backend/discover/opportunity-tree.md
      - docs/feature/lakekeeper-catalog-backend/discover/wave-decisions.md
      - docs/feature/lakekeeper-catalog-backend/discuss/jtbd-job-stories.md
      - docs/feature/lakekeeper-catalog-backend/discuss/journey-lakekeeper-catalog-backend.yaml
      - docs/feature/lakekeeper-catalog-backend/discuss/user-stories.md
      - docs/feature/lakekeeper-catalog-backend/discuss/story-map.md
      - docs/feature/lakekeeper-catalog-backend/discuss/outcome-kpis.md
      - docs/feature/lakekeeper-catalog-backend/discuss/wave-decisions.md
      - docs/decisions/adr-026-ibis-as-only-sql-compiler.md
      - docs/decisions/adr-051-operations-as-canonical-transform-ir.md

