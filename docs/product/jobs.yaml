schema_version: 1
# SSOT for validated Jobs-to-be-Done across the Dashboard Chat product.
# Bootstrapped 2026-05-08 by feature `dbt-test-validation` (DIVERGE Phase 1).
# Ownership: Mayor (Zach Allen). Update via DIVERGE Phase 1 of any future feature.

jobs:
  - id: JOB-001
    title: Validate chat-driven workflows across the eject-to-dbt boundary
    feature_id: dbt-test-validation
    abstraction_layer: strategic
    statement: >
      When a chat-driven user workflow modifies the staging layer of a dataset,
      I want to validate that the resulting staged data matches the intended
      outcome contract using assertions that remain valid after the project is
      ejected to dbt, so I can ship workflow changes (chat protocol, transforms,
      dispatcher logic) without inventing a parallel validation path inside and
      outside the application.
    emotional_layer: >
      When an integration test fails, I want to know within seconds whether the
      failure is a workflow problem or a data problem, so I can triage without
      spelunking through SSE traces and pandas dataframes side-by-side.
    social_layer: >
      When I show this codebase to a data engineer hire, I want the test
      artifacts to look like the validation they already write at their day job
      (dbt tests, schema contracts, expectations).
    outcome_statements:
      - id: O1
        text: Minimize the time it takes to discover that a chat-driven workflow produced incorrect staged data
        importance: 9
        satisfaction: 6
        score: 12
        status: marginal
      - id: O2
        text: Minimize the likelihood that an assertion holds against the API response but fails against the staged data
        importance: 8
        satisfaction: 5
        score: 11
        status: marginal
      - id: O3
        text: Minimize the effort required to keep the test suite valid when the chat protocol changes
        importance: 9
        satisfaction: 3
        score: 15
        status: under-served
      - id: O4
        text: Maximize the reuse of validation logic between in-application tests and the customer's ejected dbt project
        importance: 9
        satisfaction: 2
        score: 16
        status: under-served
      - id: O5
        text: Minimize the marginal cost of adding the next user-flow test
        importance: 8
        satisfaction: 4
        score: 12
        status: marginal
      - id: O6
        text: Minimize the time it takes to triage a failing test as workflow-vs-data
        importance: 7
        satisfaction: 5
        score: 9
        status: appropriately-served
    references:
      - docs/feature/dbt-test-validation/diverge/job-analysis.md
      - docs/evolution/2026-05-01-api-driven-user-flow-tests.md
      - docs/evolution/2026-05-07-refactor-dataset-layer-harness.md
      - features/dbt-project-export.feature
      - features/dbt-model-layers.feature

  - id: JOB-002
    title: Drive every user flow through a server-owned state machine that UI and tests share
    feature_id: user-flow-state-machines
    abstraction_layer: strategic
    statement: >
      When a Dashboard Chat user moves through any of the product's flows
      (auth, org setup, project/session management, upload, preview,
      transforms, view/report, dbt export), I want the flow's state to be
      owned by a single server-driven state machine — drivable from the
      Node server, projected to the UI, and assertable by a TS headless
      harness — so that the presentation layer is a thin consumer of a
      single source of truth instead of N React state machines that
      re-derive flow logic and drift from production.
    emotional_layer: >
      When I add a new user flow OR a new flow test, I want the marginal
      cost to be defining one new machine — not editing N coordinated
      places (FE component state, FE test setup, Python integration
      harness, agent prompts).
    social_layer: >
      When I show this codebase to a new contributor, I want flow state
      to look like one obvious file per flow — not a spelunk through
      React components, TanStack Query keys, and Python harness adapters
      to reconstruct what "logged in and org set up" means.
    outcome_statements:
      # Scoring is provisional — DISCUSS-derived, not ODI-rigorous. A
      # formal DIVERGE pass (if/when revisited) would interview real
      # users to confirm importance + measure satisfaction. For now
      # importance reflects developer + user impact intuition and
      # satisfaction reflects current observable state.
      - id: O1
        text: Minimize the time it takes to add a new user flow's headless test
        importance: 9
        satisfaction: 2
        score: 16
        status: under-served
      - id: O2
        text: Minimize the divergence between what the UI shows and what a headless test asserts
        importance: 9
        satisfaction: 3
        score: 15
        status: under-served
      - id: O3
        text: Minimize the cost of changing one flow's transition rules (one place, not N)
        importance: 8
        satisfaction: 3
        score: 13
        status: under-served
      - id: O4
        text: Minimize the time-to-recovery when a flow hits an unexpected state (visible error UI + same error from the harness)
        importance: 7
        satisfaction: 4
        score: 10
        status: marginal
      - id: O5
        text: Maximize the reuse of flow assertions between the in-app dev TS harness and the acceptance Python integration suite
        importance: 8
        satisfaction: 4
        score: 12
        status: marginal
    composition_with_other_jobs:
      - related_job: JOB-001
        relationship: >
          Compositional — JOB-001's under-served outcomes O3 (effort to keep
          tests valid when chat protocol changes), O4 (reuse of validation
          logic between in-app tests and ejected dbt), and O5 (marginal cost
          of next user-flow test) are directly improved by JOB-002. The
          existing Python integration harness (DatasetLayerHarness) remains
          the backend+agent contract guard for JOB-001; the new TS harness
          composed on top of the state-machine layer is the user-flow surface
          for JOB-002. Both observe the same server-owned machines.
    references:
      - docs/feature/user-flow-state-machines/discuss/wave-decisions.md
      - docs/feature/user-flow-state-machines/discuss/journey-inventory.md
      - docs/feature/user-flow-state-machines/discuss/journey-login-and-org-setup-visual.md
      - docs/feature/user-flow-state-machines/discuss/journey-login-and-org-setup.yaml
      - docs/feature/user-flow-state-machines/discuss/story-map.md
      - docs/feature/user-flow-state-machines/discuss/user-stories.md
      - docs/feature/user-flow-state-machines/discuss/outcome-kpis.md
      - docs/feature/user-flow-state-machines/discuss/shared-artifacts-registry.md
      - docs/product/journeys/login-and-org-setup.yaml
      - docs/product/journeys/_inventory.md
      - docs/decisions/adr-015-headless-presentation-state-retrieval.md

