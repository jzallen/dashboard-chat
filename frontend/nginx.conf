server {
    listen 80;
    server_name _;
    # `root` is retained ONLY so the entrypoint-written /_meta.json (this
    # container's own build identity, dc-1k8) can be served statically below.
    # Frontend assets are NOT served from here anymore — web-ssr owns them
    # (ADR-047). There is no SPA index to serve, so no `index` directive.
    root /usr/share/nginx/html;

    # SSR catch-all — proxy non-static, non-API routes to web-ssr (ADR-034 / DWD-8).
    # The resolver + variable defers DNS so nginx starts even if web-ssr is not yet up.
    location / {
        resolver 127.0.0.11 valid=10s;
        set $web_ssr_upstream http://web-ssr:3001;
        proxy_pass $web_ssr_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # Proxy presentation-state log reads to the agent (ADR-015 /
    # dc-x3y.2.2). Storage is co-located with the agent's in-process
    # Map; this rule must precede the catch-all /api/ → auth-proxy
    # rule so the regex match wins over the prefix match.
    location ~ ^/api/channels/[^/]+/presentation-state$ {
        resolver 127.0.0.11 valid=10s;
        set $worker_upstream http://agent:8787;
        proxy_pass $worker_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://auth-proxy:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy ui-state tier requests through auth-proxy (ADR-030 §SD1).
    # auth-proxy handles the `/ui-state/*` prefix: it injects DEV_USER
    # identity headers in dev mode (or verifies the JWT and forwards
    # X-User-Id / X-Org-Id / X-User-Email in prod), strips the
    # `/ui-state` prefix, and proxies to the ui-state container's own
    # routes (`/health`, `/flow/:machine/begin`, …).
    location /ui-state/ {
        resolver 127.0.0.11 valid=10s;
        set $auth_proxy_upstream http://auth-proxy:3000;
        proxy_pass $auth_proxy_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy chat worker requests (resolver + variable defers DNS so nginx
    # starts even if the worker container isn't up yet)
    location /worker/ {
        resolver 127.0.0.11 valid=10s;
        set $worker_upstream http://agent:8787;
        rewrite ^/worker/(.*) /$1 break;
        proxy_pass $worker_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding off;
    }

    # Proxy health check
    location /health {
        proxy_pass http://auth-proxy:3000/health;
    }

    # Frontend assets — proxied to web-ssr, which is the SINGLE source/owner of
    # build/client (ADR-047). The catch-all `location /` would already route here;
    # this dedicated block exists to attach the long-lived immutable cache header
    # to content-hashed assets. Hashes can no longer 404 because the same build
    # that SSR-renders the document also serves these files.
    location /assets/ {
        resolver 127.0.0.11 valid=10s;
        set $web_ssr_upstream http://web-ssr:3001;
        proxy_pass $web_ssr_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Build identity for this (reverse-proxy) container, written to the static
    # root by docker-entrypoint.sh (dc-1k8 / AC2.2). Exact-match wins over the
    # `/` catch-all so it is served locally instead of proxied to web-ssr — it
    # is the reverse-proxy's OWN identity, not web-ssr's.
    location = /_meta.json {
        root /usr/share/nginx/html;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # Test-only mirror endpoint for the frontend-coexistence bearer-forwarding
    # scenarios (DD-10, Phase 02). Routes /auth-proxy/test/* to the auth-proxy
    # service, stripping the /auth-proxy/ prefix so auth-proxy sees its own
    # /test/... paths. The endpoint itself is dev-mode gated at the auth-proxy
    # layer (returns 404 when AUTH_MODE=production), so this rule is harmless
    # in production deployments.
    location /auth-proxy/test/ {
        resolver 127.0.0.11 valid=10s;
        set $auth_proxy_upstream http://auth-proxy:3000;
        rewrite ^/auth-proxy/(.*)$ /$1 break;
        proxy_pass $auth_proxy_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
