[project]
name = "dashboard-chat-acceptance-log-image-identity"
version = "0.0.1"
description = "Acceptance tests for dc-1k8 — log image identity on startup."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=7.0.0,<9.0.0",
    "pytest-bdd>=7.0.0,<9.0.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
markers = [
    "walking_skeleton: walking-skeleton scenario (real-IO end-to-end smoke)",
    "real-io: scenario requires real bazel + docker compose toolchain",
    "driving_adapter: scenario invokes the user's actual entry point (subprocess)",
    "slow: scenario is expected to take >10s wall-clock",
    "pending: scenario authored but not yet enabled — DELIVER turns these on one at a time",
]
addopts = [
    "-ra",
    "--strict-markers",
    # Default: skip @pending scenarios. DELIVER overrides per-scenario.
    "-m", "not pending",
]
