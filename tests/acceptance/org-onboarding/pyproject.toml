[project]
name = "dashboard-chat-acceptance-org-onboarding"
version = "0.0.1"
description = "Acceptance tests for org-onboarding — empty-org principal creates an org + default project, then enters the app (DISTILL)."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=7.0.0,<9.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",
    "httpx>=0.27.0,<1.0.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
asyncio_mode = "auto"
markers = [
    "real_io: scenario uses real adapters (the local compose stack — real HTTP + backend + ui-state + Redis + auth-proxy)",
    "walking_skeleton: the single end-to-end scenario gating the feature (org-less principal → org → default project → app entry)",
    "needs_compose_stack: scenario requires the local compose topology reachable on host ports (skipped otherwise)",
    "needs_dev_no_org: scenario requires the backend started with DEV_NO_ORG=true AND a dev principal with no org in the DB (the empty-org precondition)",
    "happy_path: nominal flow — no failure injection",
    "error_path: explicit validation/rejection scenario",
    "regression: locks a behavior change (D2 — no backend auto-create of a default project)",
    "s1_backend: Slice 1 — created_by column + DEV_NO_ORG DB resolution + drop auto-create",
    "s2_ui_plumbing: Slice 2 — port StateProxy (CSR+Bearer) + provider + session_begin bootstrap",
    "s3_ui_onboarding: Slice 3 — /onboarding route + gate redirect + needs_org org form",
    "s4_ui_default_project: Slice 4 — no_projects → create_project_submitted form → app entry",
    "pending: traces to a DELIVER slice not yet implemented — RED until that slice lands",
]
addopts = [
    "-ra",
    "--strict-markers",
]
