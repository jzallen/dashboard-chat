# <!-- DES-ENFORCEMENT : exempt -->
[project]
name = "dashboard-chat-acceptance-refactor-upload-pipeline-modularity"
version = "0.0.1"
description = "Acceptance tests for refactor-upload-pipeline-modularity (ADR-022)."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=7.0.0,<9.0.0",
    "pytest-bdd>=7.0.0,<9.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",
    # DWD-1 in this feature's distill/wave-decisions.md: real I/O via
    # SQLite + boto3.Stubber. The "real adapter" surface for this
    # refactor is identical to what backend/tests/use_cases/dataset/
    # test_create_dataset_from_upload.py uses for the existing 15
    # tests — that is the substrate Iron Rule binds the refactor to
    # preserve. No compose stack required (DWD-9 in DESIGN's
    # wave-decisions.md). The walking skeleton drives `create_dataset_from_upload`
    # end-to-end, so the acceptance venv installs the backend package
    # itself (which pulls FastAPI/Pydantic/etc. transitively); the
    # `--no-project` flag in the README skips uv's workspace inference,
    # not this suite's own dependency-group install.
    "dashboard-chat-backend",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.19",
    "boto3>=1.34",
    "botocore>=1.34",
    "pandas>=2.0",
    "returns>=0.22",
]

[tool.uv.sources]
dashboard-chat-backend = { path = "../../../backend", editable = true }

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
asyncio_mode = "auto"
# Mirrors tests/acceptance/refactor-metadata-repository-split/pyproject.toml
# so the session-scoped db_engine + repository_container fixtures share
# a loop with the test functions that consume them. Without alignment,
# function-scoped async fixtures get fresh per-test loops and the
# second test that consumes the engine hits "Event loop is closed."
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
markers = [
    "walking_skeleton: walking-skeleton scenario (real-IO end-to-end through the use case driving port)",
    "real-io: scenario uses the real SQLAlchemy + SQLite adapter and the boto3.Stubber-wrapped lake adapter (no in-memory doubles)",
    "driving_adapter: scenario invokes through create_dataset_from_upload (use case driving port) or DatasetController.post_dataset (HTTP-side driving adapter)",
    "milestone_1: scenario asserts the new UploadPluginDispatcher is the dispatch seam and produces the canonical MultiProcessingResult shape",
    "milestone_2: scenario asserts the silent outbox-payload asymmetry between single-file and multi-file uploads is preserved verbatim — DWD-2 HARD GATE",
    "milestone_3: scenario asserts the controller envelope, status codes, and error shapes are unchanged after the refactor",
    "asymmetry_preservation: scenario is one of the milestone-2 characterization pins for the silent outbox-payload asymmetry",
    "characterization: scenario pins CURRENT behaviour, not aspirational behaviour — Iron Rule binding under DWD-2",
    "call_site_stability: scenario asserts the refactor changes nothing observable at HTTPController.post_dataset's call boundary",
    "pending: scenario authored but not yet enabled — DELIVER unpends per phase per roadmap.json's scenarios_to_unskip",
]
addopts = [
    "-ra",
    "--strict-markers",
    # Default: skip @pending scenarios. Walking skeleton runs first;
    # milestone-1 + milestone-2 + milestone-3 carry @pending and unpend
    # per the roadmap phases.
    "-m", "not pending",
]
